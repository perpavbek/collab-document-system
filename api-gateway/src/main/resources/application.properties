spring.application.name=api-gateway

spring.main.web-application-type=reactive

server.port=${SERVER_PORT:8080}

eureka.client.service-url.defaultZone=${DISCOVERY_URL}

logging.pattern.console=%C{1.} [%-5level] %d{HH:mm:ss} - %msg%n

spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-origins=${FRONTEND_URL}
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowedMethods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allowed-headers=*
spring.cloud.gateway.server.webflux.globalcors.cors-configurations[/**].allow-credentials=true

spring.cloud.gateway.server.webflux.routes[0].id=users
spring.cloud.gateway.server.webflux.routes[0].uri=lb://user-service
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/users/**
spring.cloud.gateway.server.webflux.routes[0].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[1].id=document_websocket_sockjs_route
spring.cloud.gateway.server.webflux.routes[1].uri=lb://document-service
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/documents/ws/info/**
spring.cloud.gateway.server.webflux.routes[1].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[2].id=documents_websocket_route
spring.cloud.gateway.server.webflux.routes[2].uri=lb:ws://document-service
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/documents/ws/**
spring.cloud.gateway.server.webflux.routes[2].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[3].id=documents
spring.cloud.gateway.server.webflux.routes[3].uri=lb://document-service
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/documents/**
spring.cloud.gateway.server.webflux.routes[3].filters[0]=StripPrefix=1

spring.cloud.gateway.server.webflux.routes[4].id=version-control
spring.cloud.gateway.server.webflux.routes[4].uri=lb://version-control-service
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/versions/documents/**
spring.cloud.gateway.server.webflux.routes[4].filters[0]=StripPrefix=1