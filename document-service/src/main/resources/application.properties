spring.application.name=document-service

server.port=0

eureka.client.service-url.defaultZone=http://localhost:8081/eureka

logging.pattern.console=%C{1.} [%-5level] %d{HH:mm:ss} - %msg%n

spring.datasource.url=jdbc:postgresql://localhost:5433/document_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=supersecretkeyusedforsecuredtokenauthentication

logging.file.name=logs/document_service.log

spring.mvc.static-path-pattern=NONE